<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NutriSense AI</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <!-- Tailwind CDN with Vitality Core design tokens -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#0d631b",
              "primary-container": "#2e7d32",
              "primary-fixed": "#a3f69c",
              "primary-fixed-dim": "#88d982",
              "on-primary": "#ffffff",
              "on-primary-container": "#cbffc2",
              "on-primary-fixed": "#002204",
              "on-primary-fixed-variant": "#005312",
              "secondary": "#0058bc",
              "secondary-container": "#0070eb",
              "secondary-fixed": "#d8e2ff",
              "secondary-fixed-dim": "#adc6ff",
              "on-secondary": "#ffffff",
              "on-secondary-container": "#fefcff",
              "on-secondary-fixed": "#001a41",
              "on-secondary-fixed-variant": "#004493",
              "tertiary": "#814700",
              "tertiary-container": "#a45b00",
              "tertiary-fixed": "#ffdcc1",
              "tertiary-fixed-dim": "#ffb778",
              "on-tertiary": "#ffffff",
              "on-tertiary-container": "#ffeee2",
              "on-tertiary-fixed": "#2e1500",
              "on-tertiary-fixed-variant": "#6c3a00",
              "error": "#ba1a1a",
              "error-container": "#ffdad6",
              "on-error": "#ffffff",
              "on-error-container": "#93000a",
              "background": "#f8faf8",
              "on-background": "#191c1b",
              "surface": "#f8faf8",
              "surface-bright": "#f8faf8",
              "surface-dim": "#d8dad9",
              "surface-variant": "#e1e3e1",
              "surface-tint": "#1b6d24",
              "surface-container-lowest": "#ffffff",
              "surface-container-low": "#f2f4f2",
              "surface-container": "#eceeec",
              "surface-container-high": "#e6e9e7",
              "surface-container-highest": "#e1e3e1",
              "on-surface": "#191c1b",
              "on-surface-variant": "#40493d",
              "outline": "#707a6c",
              "outline-variant": "#bfcaba",
              "inverse-primary": "#88d982",
              "inverse-surface": "#2e3130",
              "inverse-on-surface": "#eff1ef",
            },
            borderRadius: {
              "DEFAULT": "0.25rem",
              "lg": "0.5rem",
              "xl": "0.75rem",
              "full": "9999px"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            }
          }
        }
      }
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      body { font-family: 'Inter', sans-serif; background-color: #f8faf8; }
      h1, h2, h3, .font-headline { font-family: 'Manrope', sans-serif; }
      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
      }
      .sunlight-shadow {
        box-shadow: 0px 20px 40px rgba(25, 28, 27, 0.06);
      }
      .soft-haptic:active { transform: scale(0.99); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
